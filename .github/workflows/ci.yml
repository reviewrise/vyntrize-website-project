name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_CRM: ${{ github.repository }}/vyntrize-crm
  IMAGE_NAME_WEBSITE: ${{ github.repository }}/vyntrize-website

jobs:
  validate:
    name: Install, Typecheck, Lint, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        env:
          CRM_DATABASE_URL: postgresql://build:build@localhost:5432/build
          VYNTRIZE_DATABASE_URL: postgresql://build:build@localhost:5432/build
          NEXT_PUBLIC_CRM_URL: ${{ secrets.NEXT_PUBLIC_CRM_URL || 'https://crm.vyntrise.com' }}
        run: pnpm build

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image names
        id: image-names
        run: |
          echo "crm=$(echo '${{ env.IMAGE_NAME_CRM }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "website=$(echo '${{ env.IMAGE_NAME_WEBSITE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CRM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.crm
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.crm }}:latest,${{ env.REGISTRY }}/${{ steps.image-names.outputs.crm }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_CRM_URL=${{ secrets.NEXT_PUBLIC_CRM_URL }}

      - name: Build and push Website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.website
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.website }}:latest,${{ env.REGISTRY }}/${{ steps.image-names.outputs.website }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_CRM_URL=${{ secrets.NEXT_PUBLIC_CRM_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "Navigating to deployment directory..."
            cd "${{ secrets.DEPLOY_PATH }}" || { echo "ERROR: Directory ${{ secrets.DEPLOY_PATH }} does not exist"; exit 1; }

            echo "Pulling latest code from repository..."
            git fetch origin main || { echo "ERROR: Failed to fetch latest code"; exit 1; }
            git reset --hard origin/main || { echo "ERROR: Failed to reset to origin/main"; exit 1; }

            echo "Navigating to deploy directory..."
            cd deploy

            echo "Writing .env from CI secrets..."
            cat > .env << 'EOF'
            # ─── Session ──────────────────────────────────────────────────────────────────
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}

            # ─── Database ─────────────────────────────────────────────────────────────────
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}

            # ─── Email (SMTP) ──────────────────────────────────────────────────────────────
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EMAIL_FROM_ADDRESS=${{ secrets.EMAIL_FROM_ADDRESS }}
            EMAIL_FROM_NAME=${{ secrets.EMAIL_FROM_NAME }}
            EMAIL_REPLY_TO=${{ secrets.EMAIL_REPLY_TO }}

            # ─── Email Tracking ───────────────────────────────────────────────────────────
            EMAIL_TRACKING_DOMAIN=${{ secrets.EMAIL_TRACKING_DOMAIN }}
            EMAIL_TRACKING_ENABLED=true

            # ─── SMS ──────────────────────────────────────────────────────────────────────
            VYNTRIZE_SMS_API_KEY=${{ secrets.VYNTRIZE_SMS_API_KEY }}
            VYNTRIZE_SMS_BASE_URL=${{ secrets.VYNTRIZE_SMS_BASE_URL }}

            # ─── AI Agents ────────────────────────────────────────────────────────────────
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

            # ─── Agent Feature Flags ──────────────────────────────────────────────────────
            AGENT_LEAD_SCORING_ENABLED=true
            AGENT_TASK_AUTOMATION_ENABLED=true
            AGENT_STAGNATION_DETECTION_ENABLED=true
            AGENT_EMAIL_GENERATION_ENABLED=true
            AGENT_NEXT_BEST_ACTION_ENABLED=true
            AGENT_STAGE_PROGRESSION_ENABLED=true
            AGENT_DRIP_CAMPAIGN_ENABLED=true
            AGENT_WORKFLOW_RULE_ENABLED=true
            AGENT_JOB_CONCURRENCY=5

            # ─── Google OAuth ─────────────────────────────────────────────────────────────
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}

            # ─── Webhook ──────────────────────────────────────────────────────────────────
            VYNTRISE_WEBHOOK_SECRET=${{ secrets.VYNTRISE_WEBHOOK_SECRET }}

            # ─── AI Provider ──────────────────────────────────────────────────────────────
            AI_PROVIDER=${{ secrets.AI_PROVIDER }}
            GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}
            OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}

            # ─── Public URLs (also baked into Docker at build time) ───────────────
            NEXT_PUBLIC_CRM_URL=${{ secrets.NEXT_PUBLIC_CRM_URL }}

            # ─── Email Tracking (runtime — overrides the build-time NEXT_PUBLIC_CRM_URL) ─
            # Set to the public CRM hostname so tracking pixels resolve correctly.
            EMAIL_TRACKING_DOMAIN=${{ secrets.EMAIL_TRACKING_DOMAIN }}
            EMAIL_TRACKING_ENABLED=true
            EOF

            echo "Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "Pulling latest Docker images..."
            docker compose pull

            echo "Starting database services for migrations..."
            docker compose up -d vyntrize-postgres vyntrize-redis

            echo "Waiting for Postgres to be ready..."
            docker compose exec vyntrize-postgres sh -c 'until pg_isready -U "${POSTGRES_USER:-vyntrize_user}" -d "${POSTGRES_DB:-vyntrize_db}" >/dev/null 2>&1; do sleep 1; done'

            echo "Extracting database credentials from .env..."
            if [ -f .env ]; then
              POSTGRES_USER=$(grep -E '^POSTGRES_USER=' .env | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
              POSTGRES_PASSWORD=$(grep -E '^POSTGRES_PASSWORD=' .env | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
              POSTGRES_DB=$(grep -E '^POSTGRES_DB=' .env | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
              export POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB
              echo "Credentials loaded from .env"
            else
              echo ".env file not found; using only GitHub secrets"
            fi

            echo "Running Prisma migrations on production..."
            docker run --rm \
              --network review-rise-monorepo_reviewrise-network \
              -v "${{ secrets.DEPLOY_PATH }}":/app \
              -w /app \
              -e POSTGRES_USER="${POSTGRES_USER}" \
              -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
              -e POSTGRES_DB="${POSTGRES_DB}" \
              -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vyntrize-postgres:5432/${POSTGRES_DB}" \
              -e VYNTRIZE_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vyntrize-postgres:5432/${POSTGRES_DB}" \
              -e CRM_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vyntrize-postgres:5432/${POSTGRES_DB}" \
              node:22-alpine sh -c '
                corepack enable && \
                corepack prepare pnpm@9 --activate && \
                rm -rf node_modules packages/*/node_modules && \
                pnpm install --filter @platform/vyntrize-db... --no-frozen-lockfile --ignore-scripts && \
                cd packages/@platform/vyntrize-db && \
                pnpm prisma db push --accept-data-loss=false && \
                pnpm prisma generate
              ' || { echo "ERROR: Failed to run Prisma migrations"; exit 1; }

            echo "Starting services..."
            docker compose up -d --remove-orphans

            echo "Cleaning up dangling images..."
            docker image prune -f

            echo "✅ Deployment completed successfully!"

