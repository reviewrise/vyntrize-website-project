name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_CRM: ${{ github.repository }}/vyntrize-crm
  IMAGE_NAME_WEBSITE: ${{ github.repository }}/vyntrize-website

jobs:
  validate:
    name: Install, Typecheck, Lint, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        env:
          CRM_DATABASE_URL: postgresql://build:build@localhost:5432/build
          VYNTRIZE_DATABASE_URL: postgresql://build:build@localhost:5432/build
        run: pnpm build

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image names
        id: image-names
        run: |
          echo "crm=$(echo '${{ env.IMAGE_NAME_CRM }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "website=$(echo '${{ env.IMAGE_NAME_WEBSITE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CRM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.crm
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.crm }}:latest,${{ env.REGISTRY }}/${{ steps.image-names.outputs.crm }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.website
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.website }}:latest,${{ env.REGISTRY }}/${{ steps.image-names.outputs.website }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "Navigating to deployment directory..."
            cd "${{ secrets.DEPLOY_PATH }}" || { echo "ERROR: Directory ${{ secrets.DEPLOY_PATH }} does not exist"; exit 1; }
            
            echo "Pulling latest code from repository..."
            git pull origin main || { echo "ERROR: Failed to pull latest code"; exit 1; }
            
            echo "Navigating to deploy directory..."
            cd deploy
            
            echo "Pulling latest Docker images..."
            docker compose pull
            
            echo "Starting services..."
            docker compose up -d --remove-orphans
            
            echo "✅ Deployment completed successfully!"
