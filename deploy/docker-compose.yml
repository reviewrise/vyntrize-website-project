services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - vyntrize-net

  vyntrize-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyntrize_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vyntrize_db}
    volumes:
      - vyntrize-postgres-data:/var/lib/postgresql/data
    networks:
      - vyntrize-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyntrize_user} -d ${POSTGRES_DB:-vyntrize_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vyntrize-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - vyntrize-redis-data:/data
    networks:
      - vyntrize-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vyntrize-website:
    image: ghcr.io/reviewrise/vyntrize-website-project/vyntrize-website:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - VYNTRIZE_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vyntrize-postgres:5432/${POSTGRES_DB}
    expose:
      - "3013"
    networks:
      - vyntrize-net
    depends_on:
      vyntrize-postgres:
        condition: service_healthy

  vyntrize-crm:
    image: ghcr.io/reviewrise/vyntrize-website-project/vyntrize-crm:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CRM_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vyntrize-postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://vyntrize-redis:6379
    expose:
      - "3014"
    networks:
      - vyntrize-net
    depends_on:
      vyntrize-postgres:
        condition: service_healthy
      vyntrize-redis:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
  vyntrize-postgres-data:
  vyntrize-redis-data:

networks:
  vyntrize-net:
    external: true
    name: review-rise-monorepo_reviewrise-network
