services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - vyntrize-net

  vyntrize-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyntrize_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vyntrize_db}
    volumes:
      - vyntrize-postgres-data:/var/lib/postgresql/data
    networks:
      - vyntrize-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyntrize_user} -d ${POSTGRES_DB:-vyntrize_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vyntrize-website:
    image: ghcr.io/reviewrise/vyntrize-website-project/vyntrize-website:latest
    restart: unless-stopped
    env_file:
      - /etc/vyntrize/.env
    expose:
      - "3013"
    networks:
      - vyntrize-net

  vyntrize-crm:
    image: ghcr.io/reviewrise/vyntrize-website-project/vyntrize-crm:latest
    restart: unless-stopped
    env_file:
      - /etc/vyntrize/.env
    expose:
      - "3014"
    networks:
      - vyntrize-net

volumes:
  caddy-data:
  caddy-config:
  vyntrize-postgres-data:

networks:
  vyntrize-net:
    external: true
    name: review-rise-monorepo_reviewrise-network
